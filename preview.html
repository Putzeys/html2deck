<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>html2deck</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f0f; color:#fff; font-family:system-ui,-apple-system,sans-serif; height:100vh; display:flex; flex-direction:column; }

.bar {
    background:#1a1a1a; padding:14px 24px; display:flex; align-items:center;
    gap:16px; flex-shrink:0; border-bottom:1px solid #2a2a2a; flex-wrap:wrap;
}
.bar .logo { font-weight:800; font-size:15px; color:#e44482; letter-spacing:-0.02em; }
.bar .sep { width:1px; height:24px; background:#333; flex-shrink:0; }
.bar label { font-size:12px; color:#666; text-transform:uppercase; letter-spacing:0.05em; }
.bar input[type=range] { width:200px; accent-color:#e44482; cursor:pointer; }
.bar .val { font-size:15px; font-weight:700; min-width:48px; color:#e44482; text-align:center; }
.bar select {
    background:#252525; color:#ccc; border:1px solid #333; padding:6px 10px;
    border-radius:6px; font-size:12px;
}

.actions { display:flex; gap:8px; }
.btn {
    padding:8px 18px; border:none; border-radius:6px; cursor:pointer;
    font-weight:700; font-size:12px; transition:all 0.15s;
    display:flex; align-items:center; gap:6px;
}
.btn:disabled { opacity:0.5; cursor:wait; }
.btn-pdf  { background:#3b82f6; color:#fff; }
.btn-pdf:hover:not(:disabled)  { background:#2563eb; }
.btn-pptx { background:#f59e0b; color:#000; }
.btn-pptx:hover:not(:disabled) { background:#d97706; }
.btn-mp4  { background:#10b981; color:#fff; }
.btn-mp4:hover:not(:disabled)  { background:#059669; }

.preview {
    flex:1; display:flex; align-items:center; justify-content:center;
    overflow:hidden; padding:16px; background:#0a0a0a;
}
iframe {
    background:#fff; border:1px solid #222; border-radius:6px;
    transform-origin:center center; box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.status {
    background:#1a1a1a; padding:10px 24px; font-family:'SF Mono',ui-monospace,monospace;
    font-size:12px; color:#555; border-top:1px solid #2a2a2a; min-height:36px;
    display:flex; align-items:center;
}
.status.active { color:#e44482; }

.toast {
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
    background:#10b981; color:#fff; padding:10px 28px; border-radius:8px;
    font-size:14px; font-weight:600; opacity:0; transition:opacity 0.3s;
    pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="bar">
    <span class="logo">html2deck</span>
    <div class="sep"></div>

    <label>Zoom</label>
    <input type="range" id="zoom" min="80" max="220" value="100" step="5">
    <span class="val" id="zv">100%</span>

    <div class="sep"></div>

    <label>Preview</label>
    <select id="pscale">
        <option value="0.35">35%</option>
        <option value="0.45">45%</option>
        <option value="0.5" selected>50%</option>
        <option value="0.6">60%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
    </select>

    <div class="sep"></div>

    <div class="actions">
        <button class="btn btn-pdf"  id="btn-pdf">PDF</button>
        <button class="btn btn-pptx" id="btn-pptx">PPTX</button>
        <button class="btn btn-mp4"  id="btn-mp4">MP4</button>
    </div>
</div>

<div class="preview">
    <iframe id="frame" src="{{HTML_NAME}}" scrolling="no"></iframe>
</div>

<div class="status" id="status">Ready</div>
<div class="toast" id="toast">Downloaded!</div>

<script>
var frame = document.getElementById('frame');
var slider = document.getElementById('zoom');
var valEl = document.getElementById('zv');
var scaleEl = document.getElementById('pscale');
var statusEl = document.getElementById('status');
var toastEl = document.getElementById('toast');

function applyScale() {
    var s = parseFloat(scaleEl.value);
    frame.style.width = '1920px';
    frame.style.height = '1080px';
    frame.style.transform = 'scale(' + s + ')';
}

function applyZoom() {
    var z = parseInt(slider.value);
    valEl.textContent = z + '%';
    try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        doc.body.style.zoom = (z / 100).toString();
    } catch(e) {
        console.error('Zoom error:', e);
    }
}

function showToast(msg) {
    toastEl.textContent = msg || 'Downloaded!';
    toastEl.classList.add('show');
    setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
}

function setStatus(msg, active) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (active ? ' active' : '');
}

function exportFile(fmt) {
    var z = slider.value;
    var btn = document.getElementById('btn-' + fmt);
    var origText = btn.textContent;

    // Disable all buttons
    document.querySelectorAll('.btn').forEach(function(b) { b.disabled = true; });
    btn.textContent = 'Generating...';
    setStatus('Generating ' + fmt.toUpperCase() + ' at zoom ' + z + '%...', true);

    var url = '/export?format=' + fmt + '&zoom=' + z + '&duration=4';

    fetch(url)
        .then(function(resp) {
            if (!resp.ok) throw new Error('Export failed: ' + resp.status);
            return resp.blob();
        })
        .then(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '{{HTML_NAME}}'.replace('.html', '.' + fmt);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showToast(fmt.toUpperCase() + ' downloaded!');
            setStatus('Ready');
        })
        .catch(function(err) {
            showToast('Error: ' + err.message);
            setStatus('Export failed', false);
        })
        .finally(function() {
            document.querySelectorAll('.btn').forEach(function(b) { b.disabled = false; });
            btn.textContent = origText;
        });
}

slider.addEventListener('input', applyZoom);
scaleEl.addEventListener('change', applyScale);

frame.addEventListener('load', function() {
    setTimeout(function() {
        applyZoom();
        applyScale();
        setStatus('Ready — adjust zoom and download');
    }, 1000);
});

document.getElementById('btn-pdf').addEventListener('click', function() { exportFile('pdf'); });
document.getElementById('btn-pptx').addEventListener('click', function() { exportFile('pptx'); });
document.getElementById('btn-mp4').addEventListener('click', function() { exportFile('mp4'); });
</script>
</body>
</html>
